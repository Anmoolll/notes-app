version: '3.9'

services:
  app:
    build: .
    container_name: notes-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/notesapp
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7-jammy
    container_name: notes-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'   # expose only for local dev; remove in prod
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: